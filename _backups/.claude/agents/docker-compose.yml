version: '3.8'

services:
  agent-api:
    build: .
    container_name: multi-agent-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.json:/app/config.json
    environment:
      - AGENT_API_HOST=0.0.0.0
      - AGENT_API_PORT=5000
      - AGENT_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-dashboard:
    image: nginx:alpine
    container_name: multi-agent-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - agent-api
    restart: unless-stopped

networks:
  default:
    name: agent-network
